<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="blade1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="50%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#f5a0a0"/>
    </linearGradient>
    <linearGradient id="blade2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a93226"/>
      <stop offset="50%" style="stop-color:#d63031"/>
      <stop offset="100%" style="stop-color:#e88a8a"/>
    </linearGradient>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#666"/>
      <stop offset="60%" style="stop-color:#333"/>
      <stop offset="100%" style="stop-color:#111"/>
    </radialGradient>
    <!-- Air flow lines -->
    <linearGradient id="airflow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c; stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e74c3c; stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Air flow / motion lines -->
  <path d="M 12 30 Q 18 28, 24 32" fill="none" stroke="url(#airflow)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 8 40 Q 16 37, 22 40" fill="none" stroke="url(#airflow)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 14 50 Q 19 47, 25 48" fill="none" stroke="url(#airflow)" stroke-width="1" stroke-linecap="round"/>

  <g transform="translate(54, 50)">
    <!-- Blade 1 - Top right (curved swooping) -->
    <path d="M 3,-5 C 8,-12, 4,-28, -2,-34 C 2,-28, 12,-18, 5,-3 Z" fill="url(#blade1)"/>
    <path d="M 3,-5 C 8,-12, 4,-28, -2,-34 C -1,-26, 6,-16, 5,-3 Z" fill="url(#blade2)" opacity="0.5"/>

    <!-- Blade 2 - Bottom right (curved swooping) -->
    <path d="M 5,3 C 12,8, 28,4, 34,-2 C 28,2, 18,12, 3,5 Z" fill="url(#blade1)"/>
    <path d="M 5,3 C 12,8, 28,4, 34,-2 C 26,-1, 16,6, 3,5 Z" fill="url(#blade2)" opacity="0.5"/>

    <!-- Blade 3 - Bottom left (curved swooping) -->
    <path d="M -3,5 C -8,12, -4,28, 2,34 C -2,28, -12,18, -5,3 Z" fill="url(#blade1)"/>
    <path d="M -3,5 C -8,12, -4,28, 2,34 C 1,26, -6,16, -5,3 Z" fill="url(#blade2)" opacity="0.5"/>

    <!-- Blade 4 - Top left (curved swooping) -->
    <path d="M -5,-3 C -12,-8, -28,-4, -34,2 C -28,-2, -18,-12, -3,-5 Z" fill="url(#blade1)"/>
    <path d="M -5,-3 C -12,-8, -28,-4, -34,2 C -26,1, -16,-6, -3,-5 Z" fill="url(#blade2)" opacity="0.5"/>

    <!-- Center ring -->
    <circle cx="0" cy="0" r="7" fill="url(#center)"/>
    <circle cx="0" cy="0" r="4" fill="none" stroke="#555" stroke-width="1"/>
    <circle cx="0" cy="0" r="2.5" fill="#222"/>
    <circle cx="0" cy="0" r="1" fill="#444"/>
  </g>
</svg>
