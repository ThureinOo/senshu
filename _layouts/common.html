<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>
            {% if page.url != '/' %}
            {% if page.layout == 'bin' %}
            {{ page.title | downcase }}
            {% else %}
            {{ page.title }}
            {% endif %}
            |
            {% endif %}
            {{ site.title }}
        </title>
        <link rel="icon" href="{{ site.baseurl }}/assets/logo.png">
        <link id="pagestyle" rel="stylesheet" href="{{ site.baseurl }}/assets/style.css" type="text/css"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
        <meta name="description" content="Senshu — Interactive pentest command cheat sheet. Filter by services, techniques, and more.">
        <script async defer src="https://buttons.github.io/buttons.js"></script>
    </head>
    <body>
        <script type="text/javascript">
            document.addEventListener('DOMContentLoaded', function () {
                if (localStorage["style"] === "true") {
                    document.getElementById('pagestyle').setAttribute('href','{{ site.baseurl }}/assets/styleDark.css');
                    var checkbox = document.querySelector('.switch input[type="checkbox"]');
                    if (checkbox) checkbox.checked = true;
                }
                var checkbox = document.querySelector('.switch input[type="checkbox"]');
                if (checkbox) {
                    checkbox.addEventListener('change', function () {
                        if (checkbox.checked) {
                            document.getElementById('pagestyle').setAttribute('href','{{ site.baseurl }}/assets/styleDark.css');
                            localStorage["style"] = "true";
                        } else {
                            document.getElementById('pagestyle').setAttribute('href','{{ site.baseurl }}/assets/style.css');
                            localStorage["style"] = "false";
                        }
                    });
                }
            });
        </script>

        <div class="page-content">
            {{ content }}
        </div>

        <script>
         document.querySelectorAll('h2, h3, h4, h5').forEach((heading) => {
             const link = document.createElement('a');
             link.className = 'permalink';
             link.href = `#${heading.id}`;
             heading.appendChild(link);
         });
        </script>
    </body>
</html>
